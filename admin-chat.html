<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    :root {
      --admin-chat-bg: #18191a;
      --admin-chat-sidebar: #242526;
      --admin-chat-main: #18191a;
      --admin-chat-header: #242526;
      --admin-chat-input: #3a3b3c;
      --admin-chat-bubble: #0084ff;
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
    }
    
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--admin-chat-bg);
      color: var(--text-primary);
      padding-top: 60px;
    }
    
    .header-logo-space {
      position:fixed;
      top:12px;
      left:18px;
      z-index:1001;
      display:flex;
      align-items:center;
      gap:6px;
    }
    
    .header-logo {
      max-height:40px;
      max-width:150px;
      width:auto;
      height:auto;
      object-fit:contain;
      filter: brightness(0) invert(1);
    }
    
    .header-logo-space .logo-text-link {
      color:#fff;
      font-weight:700;
      font-size:1rem;
      text-decoration:none;
      transition:opacity 0.2s;
      white-space:nowrap;
    }
    
    .header-logo-space .logo-text-link:hover {
      opacity:0.7;
    }

@media (min-width: 1200px) {
    .header-logo-space .logo-text-link { font-size:1.1rem; }
  }

@media (max-width: 1199px) and (min-width: 901px) {
    .header-logo-space {
      gap:4px;
    }
    .header-logo {
       max-height:28px;
       max-width:80px;
     }
    .header-logo-space .logo-text-link {
       font-size:0.85rem;
     }
  }

@media (max-width: 900px) {
     .header-logo-space {
       left:12px;
       gap:4px;
     }
     .header-logo { max-height:28px; max-width:80px; }
     .header-logo-space .logo-text-link {
        font-size:0.85rem;
      }
   }
      
    .admin-chat-app {
      display: flex;
      height: 100vh;
    }
    
    .chat-sidebar {
      width: 320px;
      background: var(--admin-chat-sidebar);
      border-right: 1px solid #393a3b;
      display: flex;
      flex-direction: column;
    }
    
    .chat-sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #393a3b;
    }
    
    .chat-sidebar-header h2 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--text-primary);
    }
    
    .chat-search {
      padding: 12px 16px;
      border-bottom: 1px solid #393a3b;
    }
    
    .chat-search input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      background: var(--admin-chat-input);
      color: var(--text-primary);
    }
    
    .conversations-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #393a3b;
    }
    
    .conversation-item:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .conversation-item.active {
      background: rgba(255,255,255,0.1);
    }
    
    .conversation-avatar, .chat-partner-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .chat-partner-avatar {
      width: 40px;
      height: 40px;
    }
    
    .conversation-info {
      flex: 1;
      min-width: 0;
    }
    
    .conversation-name {
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .conversation-preview {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .chat-main-header {
      padding: 16px 20px;
      background: var(--admin-chat-header);
      border-bottom: 1px solid #393a3b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .chat-main-header h3 {
      margin: 0;
      flex: 1;
      color: var(--text-primary);
    }
    
    .chat-messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .message-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
    }
    
    .message-bubble.admin {
      background: #0b7a3a;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    
    .message-bubble.user {
      background: var(--admin-chat-bubble);
      color: white;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    
    .message-bubble.system {
      background: #333;
      color: var(--text-secondary);
      margin: 0 auto;
      font-style: italic;
      text-align: center;
    }
    
    .chat-input-container {
      padding: 16px 20px;
      background: var(--admin-chat-header);
      display: flex;
      gap: 12px;
      border-top: 1px solid #393a3b;
    }
    
    .chat-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-input {
       flex: 1;
       padding: 12px 16px;
       border-radius: 20px;
       border: none;
       background: var(--admin-chat-input);
       color: var(--text-primary);
       font-family: inherit;
       width: 100%;
       box-sizing: border-box;
       min-height: 40px;
       max-height: 120px;
     }
     
    textarea.chat-input {
       resize: none;
       overflow-y: auto;
     }
     
    .chat-send-btn {
      background: #0b7a3a;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
    }
     
    .back-to-admin {
      padding: 12px 16px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    @media (max-width: 768px) {
      .chat-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      
      .chat-sidebar.show {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div class="header-logo-space">
    <a href="#" onclick="showAboutUs(); return false;"><img src="images/logo.png" alt="7 Pharmaceuticals Logo" class="header-logo" id="header-logo"></a>
    <a href="index.html" class="logo-text-link">7 Pharmaceuticals</a>
  </div>
  <div class="admin-chat-app">
    <!-- Sidebar -->
    <div class="chat-sidebar" id="chat-sidebar">
      <a href="admin.html" class="back-to-admin">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Admin</span>
      </a>
      
      <div class="chat-sidebar-header">
        <h2>All Conversations</h2>
      </div>
      
      <div class="chat-search">
        <input type="text" id="chat-search" placeholder="Search conversations..." onkeyup="searchConversations()">
      </div>
      
      <div class="conversations-list" id="conversations-list">
        <!-- Conversations loaded dynamically -->
        <div class="no-conversations" style="padding: 20px; text-align: center; color: var(--text-secondary);">
          Loading conversations...
        </div>
      </div>
    </div>
    
    <div class="chat-sidebar-backdrop" id="chat-sidebar-backdrop" onclick="toggleSidebar()"></div>
    
    <!-- Main Chat Area -->
    <div class="chat-main">
      <div class="chat-main-header">
        <button class="mobile-only" onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.2rem;">
          <i class="fas fa-bars"></i>
        </button>
        <div class="chat-partner-avatar">
          <i class="fas fa-user" style="font-size:1.2rem; color:#fff;"></i>
        </div>
        <h3 id="chat-partner-name">Select a conversation</h3>
        <span id="payment-status-badge" style="padding:4px 10px; border-radius:4px; font-size:0.8rem;"></span>
      </div>
      
      <div class="chat-messages-container" id="chat-messages-container">
        <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
          Select a conversation to view messages
        </div>
      </div>
      
      <div class="chat-input-container">
        <div class="chat-input-wrapper">
          <textarea id="admin-message-input" class="chat-input" placeholder="Type a reply..." rows="1" style="resize:none; font-family:inherit;"></textarea>
        </div>
        <button class="chat-send-btn" onclick="sendAdminReply()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>
  
  <script src="JS/javascript.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadAdminConversations();
      
      // Handle Enter key and auto-expand for admin textarea
      const adminInput = document.getElementById('admin-message-input');
      if (adminInput) {
        adminInput.addEventListener('input', function() {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        adminInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendAdminReply();
          }
        });
      }
      
      // Polling for new messages
      let adminChatPollInterval = null;
      let lastAdminMessageId = 0;
      
      async function pollForAdminMessages() {
        if (!currentChatPaymentId) return;
        
        try {
          const adminToken = localStorage.getItem('auth_token');
          const response = await fetch(`/api/chat/${currentChatPaymentId}`, {
            headers: { 'X-Admin-Token': adminToken }
          });
          const data = await response.json();
          const msgs = data.messages || [];
          
          if (msgs.length > lastAdminMessageId) {
            for (let i = lastAdminMessageId; i < msgs.length; i++) {
              renderAdminMessage(msgs[i]);
            }
            lastAdminMessageId = msgs.length;
          }
        } catch (error) {
          console.error('Poll error:', error);
        }
      }
      
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && adminChatPollInterval === null) {
          pollForAdminMessages();
          adminChatPollInterval = setInterval(pollForAdminMessages, 3000);
        } else if (document.hidden && adminChatPollInterval) {
          clearInterval(adminChatPollInterval);
          adminChatPollInterval = null;
        }
      });
      
      setTimeout(() => pollForAdminMessages(), 100);
    });
    
    function toggleSidebar() {
      const sidebar = document.getElementById('chat-sidebar');
      sidebar.classList.toggle('show');
    }
    
    function searchConversations() {
      const query = document.getElementById('chat-search').value.toLowerCase();
      const items = document.querySelectorAll('.conversation-item');
      items.forEach(item => {
        const name = item.querySelector('.conversation-name').textContent.toLowerCase();
        item.style.display = name.includes(query) ? 'flex' : 'none';
      });
    }
    
    async function loadAdminConversations() {
      const container = document.getElementById('conversations-list');
      
      try {
        const adminToken = localStorage.getItem('auth_token');
        
        // Load payment conversations
        const paymentsResp = await fetch('/api/admin/payments', {
          headers: { 'X-Admin-Token': adminToken }
        });
        const paymentsData = await paymentsResp.json();
        const payments = paymentsData.payments || [];
        
        // Load support conversations - use X-Admin-Token header
        const supportResp = await fetch('/api/conversations', {
          headers: { 'X-Admin-Token': adminToken }
        });
        const supportData = await supportResp.json();
        const supportConvs = supportData.conversations || [];
        
        container.innerHTML = '';
        
        // Add payment conversations
        payments.forEach(p => {
          const item = document.createElement('div');
          item.className = 'conversation-item';
          item.onclick = () => openAdminConversation(p.id, p);
          item.innerHTML = `
            <div class="conversation-avatar avatar-placeholder">
              <i class="fas fa-user"></i>
            </div>
            <div class="conversation-info">
              <div class="conversation-name">${p.username || 'Customer'}</div>
              <div class="conversation-preview">${p.status === 'verified' ? 'Payment verified' : 'Pending approval'}</div>
            </div>
            <span style="font-size:0.75rem; color:#888;">${p.status === 'verified' ? '<i class="fas fa-check-circle" style="color:#0b7a3a;"></i>' : '<i class="fas fa-clock" style="color:#ff8c00;"></i>'}</span>
          `;
          container.appendChild(item);
        });
        
        // Add support conversations
        supportConvs.filter(c => c.id.startsWith('support_')).forEach(conv => {
          const item = document.createElement('div');
          item.className = 'conversation-item';
          item.onclick = () => openAdminConversation(conv.id, { id: conv.id, username: conv.username || 'Support', status: 'support' });
          item.innerHTML = `
            <div class="conversation-avatar avatar-placeholder" style="background:#0084ff;">
              <i class="fas fa-headset"></i>
            </div>
            <div class="conversation-info">
              <div class="conversation-name">${conv.username || 'Support'}</div>
              <div class="conversation-preview">Support conversation</div>
            </div>
            <span style="font-size:0.75rem; color:#0084ff;"><i class="fas fa-bolt"></i></span>
          `;
          container.appendChild(item);
        });
        
        if (container.children.length === 0) {
          container.innerHTML = '<div style="padding:20px; text-align:center; color:#b0b3b8;">No conversations yet.</div>';
        }
      } catch (error) {
        container.innerHTML = '<div style="padding:20px; text-align:center; color:#e74c3c;">Error loading conversations</div>';
      }
    }
    
    async function openAdminConversation(paymentId, payment) {
      currentChatPaymentId = paymentId;
      lastAdminMessageId = 0;
      document.getElementById('chat-partner-name').textContent = payment.username || 'Customer';
      document.getElementById('payment-status-badge').textContent = payment.status.toUpperCase();
      document.getElementById('payment-status-badge').style.background = payment.status === 'verified' ? 'rgba(11,122,58,0.2)' : 'rgba(255,140,0,0.2)';
      document.getElementById('payment-status-badge').style.color = payment.status === 'verified' ? '#0b7a3a' : '#ff8c00';
      
      // Load messages
      const messagesContainer = document.getElementById('chat-messages-container');
      messagesContainer.innerHTML = '<p style="text-align:center; color:#888;">Loading...</p>';
      
      try {
        const adminToken = localStorage.getItem('auth_token');
        const response = await fetch(`/api/chat/${paymentId}`, {
          headers: { 'X-Admin-Token': adminToken }
        });
        const data = await response.json();
        
        messagesContainer.innerHTML = '';
        data.messages.forEach(renderAdminMessage);
      } catch (error) {
        messagesContainer.innerHTML = '<p style="text-align:center; color:#e74c3c;">Failed to load messages</p>';
      }
    }
    
    function renderAdminMessage(msg) {
      const messagesContainer = document.getElementById('chat-messages-container');
      const row = document.createElement('div');
      row.className = 'message-row';
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.innerHTML = '<i class="fas fa-user' + (msg.from === 'admin' ? '-shield' : '') + '" style="color:#' + (msg.from === 'admin' ? '0b7a3a' : '1e90ff') + ';"></i>';
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble ' + msg.from;
      bubble.textContent = msg.text;
      
      if (msg.from === 'admin') {
        row.appendChild(bubble);
        row.appendChild(avatar);
      } else {
        row.appendChild(avatar);
        row.appendChild(bubble);
      }
      
      messagesContainer.appendChild(row);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    async function sendAdminReply() {
      const input = document.getElementById('admin-message-input');
      if (!input) return;
      
      const text = input.value.trim();
      if (!text || !currentChatPaymentId) return;
      
      // Store value before clearing
      const originalValue = input.value;
      input.value = '';
      input.style.height = 'auto';
      
      try {
        const adminToken = localStorage.getItem('auth_token');
        await fetch(`/api/chat/${currentChatPaymentId}`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Admin-Token': adminToken 
          },
          body: JSON.stringify({ text })
        });
        
        renderAdminMessage({ from: 'admin', text });
      } catch (error) {
        console.error('Failed to send message:', error);
        // Restore value on error
        input.value = originalValue;
      }
    }
  </script>
</body>
</html>
